# --- Site Settings ---
title: Naida Vishad
tagline: Computer Engineering Student | UET Lahore
email: your-email@example.com
description: >- # This is for SEO/Google search results
  A professional reflective portfolio documenting my journey in 
  Computer Engineering, Database Systems, and technical resilience.

# --- URL Settings ---
# Leave baseurl empty ("") if your repo is naidavishad07.github.io
baseurl: "" 
url: "https://github.io"

# --- Author/Social Links ---
author:
  name: Naida Vishad
  twitter: naidavishad07
  github:  naidavishad07
  linkedin: naidavishad07

# --- Build Settings ---
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# --- Minima Theme Configuration ---
minima:
  skin: classic # Options: classic, dark, solarized
  social_links:
    - { platform: github, user_url: "https://github.com" }
    - { platform: linkedin, user_url: "https://linkedin.com" }
    # - { platform: twitter, user_url: "https://twitter.com" }

# --- Exclusions ---
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
